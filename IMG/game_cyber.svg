<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" rx="24" ry="24" fill="#080914"/>
  <rect x="0" y="0" width="800" height="450" fill="url(#neon)" opacity="0.08"/>
  <g filter="url(#glow)">
    <path d="M100 350 L700 120" stroke="#06b6d4" stroke-width="8" opacity="0.6"/>
    <path d="M120 340 L680 180" stroke="#8b5cf6" stroke-width="5" opacity="0.5"/>
  </g>
  <circle cx="580" cy="130" r="50" fill="#fff" opacity="0.12"/>
  <circle cx="600" cy="140" r="25" fill="#06b6d4" opacity="0.28"/>
  <text x="50%" y="60%" text-anchor="middle" fill="url(#neon)" font-family="Orbitron, sans-serif" font-size="72" font-weight="800" letter-spacing="6">CYBER</text>
  <text x="50%" y="72%" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="32" font-weight="700" letter-spacing="3">ARENA</text>
  <rect x="120" y="310" width="560" height="18" rx="9" fill="#fff" opacity="0.12"/>
</svg>
